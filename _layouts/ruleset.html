<!DOCTYPE html>
<html lang="{{ site.lang | default: 'it' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body class="markdown-body" data-document>
    <a id="top"></a>

    <div class="doc-toolbar" role="navigation" aria-label="Strumenti documento">
      <button id="toggle-night" type="button" aria-pressed="false">🌙 Modalità notte</button>
      {% if site.pdf_url %}
      <a class="pdf-link" href="{{ site.pdf_url }}">⬇︎ Scarica PDF</a>
      {% endif %}
    </div>

    {{ content }}

    <script>
      // Night-mode toggle (persists for the session only; no storage APIs on Pages needed)
      (function () {
        var btn = document.getElementById('toggle-night');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var on = document.body.classList.toggle('night-mode');
          btn.setAttribute('aria-pressed', String(on));
          btn.textContent = on ? '☀︎ Modalità giorno' : '🌙 Modalità notte';
        });
      })();
    </script>
  </body>
</html>
