name: Build & deploy EHBA ruleset to Pages

on:
  push:
    branches: [main]     # adjust if your default branch differs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preprocess source Markdown (iA Writer -> kramdown)
        run: |
          # SOURCE = your iA Writer file, kept untouched in the repo.
          # Adjust the path/name if your source lives elsewhere.
          SOURCE="EHBA-ruleset-rev230712-IT.md"

          # 1. front matter so Jekyll applies the ruleset layout
          {
            echo "---"
            echo "layout: ruleset"
            echo "title: EHBA — Regolamento Ufficiale (IT)"
            echo "---"
            echo ""
            # 2. convert iA syntax ({{TOC}}, +++, [sectionN]) to kramdown
            python3 build_page.py "$SOURCE"
          } > index.md

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
