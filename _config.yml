title: EHBA — Regolamento Ufficiale (IT)
description: Traduzione italiana ufficiale del regolamento EHBA Hardcourt Bike Polo, revisione 230712 (2023).
lang: it

# jekyll-github-metadata needs the repo owner/name when building inside a custom
# GitHub Actions workflow; without it the build fails with "No repo name found".
repository: subfighter3/EHBA-Ruleset-IT

# Project page lives at https://subfighter3.github.io/EHBA-Ruleset-IT/, so baseurl
# makes {{ '...' | relative_url }} links (e.g. the stylesheet) resolve correctly.
# serve.sh passes --baseurl "" so local preview still works at localhost:4000/.
url: https://subfighter3.github.io
baseurl: /EHBA-Ruleset-IT
# The "Download PDF" button is wired up dynamically in _layouts/ruleset.html:
# it links the newest PDF in dist/, so no filename is hardcoded here.

# Kramdown is GitHub Pages' Markdown engine. GFM input keeps the tab-indented
# nested lists working so the CSS counters in style-ruleset.css can generate the
# clause numbers (3.1.2.1 ...) from list nesting depth.
markdown: kramdown
kramdown:
    input: GFM
    hard_wrap: false
    parse_block_html: true # lets the <div class="TOC" markdown="1"> render its inner list
    syntax_highlighter: rouge

# We render a single document, so disable the default post/collection machinery.
# dist/ (the downloadable PDF) and assets/ (css + diagrams) ARE published; the
# authoring folders are not.
exclude:
    - README.md
    - CLAUDE.md
    - CHANGELOG_IT.md
    - build_page.py
    - gen_fonts_css.py
    - serve.sh
    - Gemfile
    - Gemfile.lock
    - vendor
    - src        # iA Writer source (single source of truth) — not for the web
    - tpl        # iA Writer PDF template
    - old        # archive of previous revisions
